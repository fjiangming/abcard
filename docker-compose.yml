# ============================================
# 本地开发构建 (从源码构建)
# 远程部署请使用: docker-compose.prod.yml
# ============================================

services:
  app:
    build: .
    container_name: openai-agbc
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    shm_size: '256m'
    deploy:
      resources:
        limits:
          memory: 2G
